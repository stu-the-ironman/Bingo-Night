<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Night — Verify Card</title>
  <link rel="stylesheet" href="/static/css/verify.css">
</head>
<body>
  <div id="app">
    <header>
      <img class="site-logo" src="{{ url_for('static', filename='images/BN_logo.svg') }}" alt="Bingo Night">
      <div class="header-title">BINGO NIGHT</div>
    </header>

    <main>
      <div class="status-section">
        <div id="player-label" class="player-label">Loading…</div>
        <div id="bingo-status" class="bingo-status"></div>
      </div>

      <div id="card-wrap" class="card-wrap hidden">
        <div class="card-letter-row" id="card-letters"></div>
        <div class="card-grid" id="card-grid"></div>
        <div class="card-serial" id="card-serial"></div>
      </div>

      <div id="register-section" class="register-section hidden">
        <p class="register-hint">Enter your name to register this card:</p>
        <input type="text" id="register-name" class="register-input"
               placeholder="Your name" maxlength="30" autocomplete="off">
        <button id="btn-register" class="btn-register">Register Card</button>
      </div>

      <button id="btn-claim" class="btn-claim hidden">CLAIM BINGO! 🎉</button>

      <div id="error-msg" class="error-msg hidden"></div>
    </main>
  </div>

  <script src="/static/js/verify.js"></script>
</body>
</html>
