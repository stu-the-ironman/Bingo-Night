<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bingo Controller</title>
  <link rel="stylesheet" href="/static/css/controller.css">
</head>
<body>
  <div id="app">

    <header>
      <h1>Bingo Night</h1>
      <a href="/display" target="_blank" class="display-link">Open Display</a>
    </header>

    <!-- Current call -->
    <section class="current-section">
      <div id="current-ball" class="current-ball idle">
        <span class="ball-letter" id="ball-letter">?</span>
        <span class="ball-number" id="ball-number"></span>
      </div>
      <div id="ball-name" class="ball-name">&nbsp;</div>
    </section>

    <!-- Progress bar -->
    <div class="progress-bar-wrap">
      <div id="progress-bar" class="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label">
      <span id="called-count">0</span> called &nbsp;·&nbsp;
      <span id="remaining-count">75</span> remaining &nbsp;·&nbsp;
      <span id="player-count">0</span> players
    </div>

    <!-- Controls -->
    <section class="controls">
      <button id="btn-call" class="btn btn-call">Call Next</button>
      <button id="btn-undo" class="btn btn-undo" disabled>Undo</button>
      <button id="btn-reset" class="btn btn-reset">New Game</button>
    </section>

    <!-- Players roster -->
    <section class="players-section">
      <h2>Players <span id="player-badge" class="player-badge">0</span></h2>
      <div id="player-list" class="player-list">
        <div class="no-players">No players yet — share <strong>/play</strong></div>
      </div>
    </section>

    <!-- Called list -->
    <section class="called-section">
      <h2>Called Numbers</h2>
      <div class="called-columns">
        <div class="called-col">
          <div class="called-col-header" style="color:#e74c3c">B</div>
          <div id="list-B" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#e67e22">I</div>
          <div id="list-I" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#27ae60">N</div>
          <div id="list-N" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#2980b9">G</div>
          <div id="list-G" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#8e44ad">O</div>
          <div id="list-O" class="called-list"></div>
        </div>
      </div>
    </section>

    <!-- Link to card generator -->
    <div class="card-gen-link">
      <a href="/cards" target="_blank">Print Bingo Cards</a>
    </div>

  </div>

  <!-- Reset confirmation modal -->
  <div id="reset-modal" class="modal hidden">
    <div class="modal-box">
      <p>Start a new game? All called numbers will be cleared and players will get new cards.</p>
      <button id="confirm-reset" class="btn btn-call">Yes, New Game</button>
      <button id="cancel-reset" class="btn btn-undo">Cancel</button>
    </div>
  </div>

  <!-- BINGO winner banner -->
  <div id="winner-banner" class="winner-banner hidden">
    <div class="winner-banner-text">🎉 <span id="winner-banner-name"></span> has BINGO!</div>
    <button class="winner-banner-dismiss" id="btn-dismiss-winner">Dismiss</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/static/js/controller.js"></script>
</body>
</html>
