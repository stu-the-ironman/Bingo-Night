<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bingo Night — Controller</title>
  <link rel="stylesheet" href="/static/css/controller.css">
</head>
<body>
  <div id="app">

    <header>
      <div class="header-left">
        <img class="site-logo" src="{{ url_for('static', filename='images/BN_logo.svg') }}" alt="Bingo Night">
        <h1>Bingo Night</h1>
      </div>
      <div class="header-actions">
        <button id="btn-tts" class="btn-icon" title="Toggle voice announcements" style="display:none">🔇</button>
        <a href="/display" target="_blank" class="display-link">Open Display</a>
      </div>
    </header>

    <!-- Current call -->
    <section class="current-section">
      <div id="current-ball" class="current-ball idle">
        <span class="ball-letter" id="ball-letter">?</span>
        <span class="ball-number" id="ball-number"></span>
      </div>
      <div id="ball-name" class="ball-name">&nbsp;</div>
    </section>

    <!-- Progress bar -->
    <div class="progress-bar-wrap">
      <div id="progress-bar" class="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label">
      <span id="called-count">0</span> called &nbsp;·&nbsp;
      <span id="remaining-count">75</span> remaining &nbsp;·&nbsp;
      <span id="player-count">0</span> players
    </div>

    <!-- Controls -->
    <section class="controls">
      <button id="btn-call" class="btn btn-call">Call Next</button>
      <button id="btn-undo" class="btn btn-undo" disabled>Undo</button>
      <button id="btn-reset" class="btn btn-reset">New Game</button>
    </section>

    <!-- Pattern selector -->
    <section class="pattern-section">
      <h2>Pattern</h2>
      <div class="pattern-buttons" id="pattern-buttons">
        <button class="btn-pattern active" data-pattern="line">Any Line</button>
        <button class="btn-pattern" data-pattern="corners">Four Corners</button>
        <button class="btn-pattern" data-pattern="plus">Plus</button>
        <button class="btn-pattern" data-pattern="x">X Pattern</button>
        <button class="btn-pattern" data-pattern="blackout">Blackout</button>
      </div>
    </section>

    <!-- Players roster -->
    <section class="players-section">
      <div class="players-header">
        <h2>Players <span id="player-badge" class="player-badge">0</span></h2>
        <div class="play-share-btns">
          <button id="btn-copy-play" class="btn-share">Copy Link</button>
          <button id="btn-qr-play" class="btn-share">QR</button>
        </div>
      </div>
      <div id="play-qr" class="play-qr hidden">
        <div id="play-qr-code"></div>
      </div>
      <div id="player-list" class="player-list">
        <div class="no-players">No players yet</div>
      </div>
    </section>

    <!-- Called list -->
    <section class="called-section">
      <h2>Called Numbers</h2>
      <div class="called-columns">
        <div class="called-col">
          <div class="called-col-header" style="color:#ff2d78">B</div>
          <div id="list-B" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#ff9500">I</div>
          <div id="list-I" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#00e676">N</div>
          <div id="list-N" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#00d4ff">G</div>
          <div id="list-G" class="called-list"></div>
        </div>
        <div class="called-col">
          <div class="called-col-header" style="color:#b44dff">O</div>
          <div id="list-O" class="called-list"></div>
        </div>
      </div>
    </section>

    <!-- Cast to TV -->
    <section class="cast-section">
      <button id="btn-cast" class="btn btn-cast">Cast to TV</button>
      <div id="cast-qr" class="cast-qr hidden">
        <p class="cast-qr-label">Scan to open display on another device</p>
        <div id="qr-canvas"></div>
        <button id="btn-copy-url" class="btn-copy-url">Copy Display URL</button>
      </div>
    </section>

    <!-- Link to card generator -->
    <div class="card-gen-link">
      <a href="/cards" target="_blank">Print Bingo Cards</a>
    </div>

  </div>

  <!-- Reset confirmation modal -->
  <div id="reset-modal" class="modal hidden">
    <div class="modal-box">
      <p>Start a new game? All called numbers will be cleared and players will get new cards.</p>
      <button id="confirm-reset" class="btn btn-call">Yes, New Game</button>
      <button id="cancel-reset" class="btn btn-undo">Cancel</button>
    </div>
  </div>

  <!-- BINGO winner banner -->
  <div id="winner-banner" class="winner-banner hidden">
    <div class="winner-banner-text">🎉 <span id="winner-banner-name"></span> has BINGO!</div>
    <button class="winner-banner-dismiss" id="btn-dismiss-winner">Dismiss</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/static/js/controller.js"></script>
</body>
</html>
