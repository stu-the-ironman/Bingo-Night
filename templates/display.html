<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Night — Display</title>
  <link rel="stylesheet" href="/static/css/display.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <img class="site-logo" src="{{ url_for('static', filename='images/BN_logo.svg') }}" alt="Bingo Night">
      <div class="header-title">BINGO NIGHT</div>
      <div id="tts-indicator" class="tts-indicator" style="display:none">🔇</div>
      <div id="progress-info" class="progress-info">
        <span id="called-count">0</span> / 75 called
      </div>
    </header>

    <!-- Current ball + history -->
    <section class="current-section">
      <div id="current-ball" class="current-ball idle">
        <span class="ball-letter" id="ball-letter">?</span>
        <span class="ball-number" id="ball-number"></span>
      </div>
      <div id="waiting-msg" class="waiting-msg">Waiting for first call…</div>
      <div id="call-history" class="call-history"></div>
    </section>

    <!-- Called numbers board — one column per letter -->
    <section class="board-section">
      <div class="board">
        <div class="board-col" id="col-B">
          <div class="col-header" style="background:#e74c3c">B</div>
          <div class="col-cells" id="cells-B"></div>
        </div>
        <div class="board-col" id="col-I">
          <div class="col-header" style="background:#e67e22">I</div>
          <div class="col-cells" id="cells-I"></div>
        </div>
        <div class="board-col" id="col-N">
          <div class="col-header" style="background:#27ae60">N</div>
          <div class="col-cells" id="cells-N"></div>
        </div>
        <div class="board-col" id="col-G">
          <div class="col-header" style="background:#2980b9">G</div>
          <div class="col-cells" id="cells-G"></div>
        </div>
        <div class="board-col" id="col-O">
          <div class="col-header" style="background:#8e44ad">O</div>
          <div class="col-cells" id="cells-O"></div>
        </div>
      </div>
    </section>

  </div>

  <!-- Scan-to-join QR (bottom-right corner) -->
  <div class="qr-join">
    <div id="qr-join-code"></div>
    <div class="qr-label">Scan to join</div>
  </div>

  <!-- Winner overlay for TV -->
  <div id="winner-overlay" style="
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.82);
    flex-direction:column; align-items:center; justify-content:center; gap:2vh;
    z-index:50; cursor:pointer;
  " onclick="this.style.display='none'">
    <div style="font-size:clamp(3rem,10vw,8rem)">🎉</div>
    <div style="font-size:clamp(2rem,7vw,6rem);font-weight:900;color:#f9ca24;letter-spacing:.1em">BINGO!</div>
    <div id="winner-display-name" style="font-size:clamp(1.2rem,4vw,3rem);color:#fff"></div>
    <div style="font-size:clamp(.7rem,1.5vw,1.1rem);color:#888;margin-top:1vh">Tap anywhere to dismiss</div>
  </div>

  <audio id="tts-audio" preload="none"></audio>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/static/js/display.js"></script>
</body>
</html>
