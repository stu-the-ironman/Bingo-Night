<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Night — Cards</title>
  <link rel="stylesheet" href="/static/css/cards.css">
</head>
<body>
  <div id="controls" class="controls no-print">
    <h1>Bingo Card Generator</h1>
    <div class="control-row">
      <label for="card-count">Number of cards:</label>
      <input type="number" id="card-count" value="6" min="1" max="30">
    </div>
    <div class="btn-row">
      <button id="btn-generate" class="btn">Generate</button>
      <button id="btn-bw" class="btn btn-bw">B&amp;W</button>
      <button id="btn-print" class="btn btn-print">Print</button>
    </div>
    <p class="hint">Cards print 2 per row. Use your browser's print dialog.</p>
  </div>

  <div id="cards-container" class="cards-container"></div>

  <script src="/static/js/cards.js"></script>
</body>
</html>
